// ─── CLOCK ───────────────────────────────────────────────────────────────────

function updateClock() {
  const now = new Date();
  const str = now.toUTCString().replace('GMT', 'UTC');
  document.getElementById('live-clock').textContent = str;
  document.getElementById('footer-time').textContent = str;
}
updateClock();
setInterval(updateClock, 1000);

// ─── STATUS CHECK (UPDATED PART) ────────────────────────────────────────────

function checkStatus() {
  const q = input.value.trim();
  if (!q) return;
  sugBox.style.display = 'none';

  const match = SAAS_DB.find(s => s.name.toLowerCase() === q.toLowerCase())
    || SAAS_DB.find(s => s.name.toLowerCase().includes(q.toLowerCase()));

  const target = match || {
    name: q,
    url: `https://${q.toLowerCase().replace(/\s+/g, '')}.com`,
    category: 'Unknown'
  };

  showChecking(target.name);

  // ✅ REAL BACKEND CALL (replaces simulateCheck)
  fetch('/check', {
  method: 'POST',
  headers: {
    'Content-Type': 'application/json'
  },
  body: JSON.stringify({
    name: target.name,
    url: target.url
  })
})
  .then(res => res.json())
  .then(result => {
    showResult(target, result);
  })
  .catch(err => {
    console.error('Check failed:', err);

    // fallback so UI doesn’t break
    showResult(target, {
      statusCode: 'red',
      latency: 0,
      uptime: '0.00',
      incidents: 0
    });
  });
}

// ─── REMOVE SIMULATION (kept harmlessly but no longer used) ─────────────────
